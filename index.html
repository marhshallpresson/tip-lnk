  <script>
    if (!window.navigator.wallets) {
      Object.defineProperty(window.navigator, 'wallets', {
        value: [],
        writable: true,
        configurable: true
      });
    } else if (!Array.isArray(window.navigator.wallets)) {
      try {
        Object.defineProperty(window.navigator, 'wallets', {
          value: [],
          writable: true,
          configurable: true
        });
      } catch (e) {
        window.navigator.wallets = [];
      }
    }
  </script>
